name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  DEV_DEPS: ruff mypy pytest pytest-asyncio pytest-cov fakeredis types-pyjwt

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e . $DEV_DEPS
      - run: ruff check .
      - run: mypy src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e . $DEV_DEPS
      - run: pytest --cov --cov-report=term-missing

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: .
